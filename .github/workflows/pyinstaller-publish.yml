name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v0.1.1)'
        required: true
        default: 'v0.1.1'
        type: string
      release:
        description: '是否创建 Release'
        required: true
        default: true
        type: boolean

jobs:
  build:
    permissions:
      contents: write
    runs-on: 'windows-latest'
    steps:
    - uses: actions/checkout@v4
    
    - name: Update version in Cargo.toml
      shell: pwsh
      run: |
        $version = "${{ github.event.inputs.version }}"
        # 移除 v 前缀
        $version = $version -replace '^v', ''
        
        # 读取 Cargo.toml
        $cargoToml = Get-Content Cargo.toml -Raw
        
        # 替换版本号
        $cargoToml = $cargoToml -replace '(?m)^version = "[^"]+"', "version = `"$version`""
        
        # 写回文件
        Set-Content Cargo.toml $cargoToml
        
        Write-Host "版本号已更新为: $version"
        Get-Content Cargo.toml | Select-String "version" | Select-Object -First 5
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    
    - name: Build frontend
      run: |
        npm install
        npm run build
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
    
    - name: Build Rust extension
      uses: PyO3/maturin-action@v1
      with:
        command: build
        args: --release
    
    - name: Build EXE with PyInstaller
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install target/wheels/*.whl
        pip install Pillow pyinstaller
        pyinstaller biliup.spec
    
    - name: Package EXE
      shell: pwsh
      run: |
        $version = "${{ github.event.inputs.version }}"
        $targetTriple = rustc -Vv | Select-String "host:" | ForEach-Object {$_.Line.split(" ")[1]}
        $archiveName = "biliup-$version-x86_64-windows.zip"
        
        # 压缩 dist/bbup 文件夹
        Compress-Archive -Path "dist/bbup/*" -DestinationPath $archiveName
        
        Write-Host "创建压缩包: $archiveName"
        Write-Host "目标架构: $targetTriple"
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: biliup-windows-exe
        path: biliup-*.zip
    
    - name: Create Release
      if: ${{ github.event.inputs.release == 'true' }}
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: ${{ github.event.inputs.version }}
        files: biliup-*.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
