# 完整的 CI/CD 工作流
# 功能：自动编译、测试、覆盖率分析、通知

name: Complete CI/CD

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      run_tests:
        description: '运行测试'
        required: true
        default: true
        type: boolean
      run_coverage:
        description: '运行覆盖率分析'
        required: true
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ==========================================
  # 阶段 1: 代码检查和格式验证
  # ==========================================
  lint-and-format:
    name: 代码检查与格式验证
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "lint"

      - name: 检查 Rust 代码格式
        run: cargo fmt --all -- --check

      - name: Clippy 检查
        run: cargo clippy --all-features --all-targets -- -D warnings

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 缓存 pip 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 安装 Python 依赖
        run: |
          pip install black ruff mypy
          pip install -e .

      - name: 检查 Python 代码格式 (Black)
        run: black --check biliup/

      - name: Python 代码静态检查 (Ruff)
        run: ruff check biliup/

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 检查前端代码格式
        run: |
          npm ci
          npm run lint
        working-directory: ./app

  # ==========================================
  # 阶段 2: Rust 编译和测试
  # ==========================================
  rust-build-and-test:
    name: Rust 编译与测试 (${{ matrix.os }})
    needs: lint-and-format
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.os }}-rust"

      - name: 编译 Rust 项目 (Debug)
        run: cargo build --workspace --all-targets

      - name: 运行 Rust 单元测试
        run: cargo test --workspace --all-targets --no-fail-fast
        timeout-minutes: 30

      - name: 编译 Release 版本
        run: cargo build --release -p biliup-cli

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: rust-binary-${{ matrix.os }}
          path: |
            target/release/biliup
            target/release/biliup.exe
          retention-days: 7

  # ==========================================
  # 阶段 3: Python 测试
  # ==========================================
  python-test:
    name: Python 测试 (${{ matrix.os }})
    needs: lint-and-format
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 缓存 pip 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov pytest-html
          pip install -e ".[test]"

      - name: 运行 Python 测试
        run: |
          pytest crates/stream-gears/tests/ \
            -v \
            --tb=short \
            --html=pytest-report-${{ matrix.os }}-py${{ matrix.python-version }}.html \
            --self-contained-html
        continue-on-error: true

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: pytest-report-*.html
          retention-days: 30

  # ==========================================
  # 阶段 4: 覆盖率分析
  # ==========================================
  coverage:
    name: 代码覆盖率分析
    needs: [rust-build-and-test, python-test]
    runs-on: ubuntu-latest
    if: github.event.inputs.run_coverage != 'false'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: 安装 cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2

      - name: 生成 Rust 覆盖率报告
        run: |
          cargo tarpaulin \
            --workspace \
            --all-features \
            --timeout 300 \
            --out xml \
            --out html \
            --output-dir coverage-rust
        continue-on-error: true

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 缓存 pip 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}

      - name: 安装 Python 依赖
        run: |
          pip install pytest pytest-cov coverage
          pip install -e .

      - name: 生成 Python 覆盖率报告
        run: |
          pytest crates/stream-gears/tests/ \
            --cov=biliup \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term
        continue-on-error: true

      - name: 合并覆盖率报告
        run: |
          mkdir -p coverage-combined
          cp -r coverage-rust/* coverage-combined/ 2>/dev/null || true
          cp -r htmlcov/* coverage-combined/ 2>/dev/null || true

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage-rust/
            htmlcov/
            coverage.xml
          retention-days: 30

      - name: 发布覆盖率到 Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml,./cobertura.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ==========================================
  # 阶段 5: 前端构建和测试
  # ==========================================
  frontend-build:
    name: 前端构建与测试
    needs: lint-and-format
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行前端测试
        run: npm test -- --coverage --watchAll=false
        working-directory: ./app
        continue-on-error: true

      - name: 构建前端
        run: npm run build
        working-directory: ./app

      - name: 上传前端构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: app/dist/
          retention-days: 7

  # ==========================================
  # 阶段 6: 集成测试
  # ==========================================
  integration-test:
    name: 集成测试
    needs: [rust-build-and-test, python-test, frontend-build]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: biliup_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 缓存 pip 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}

      - name: 安装依赖
        run: |
          pip install -e ".[test]"
          cargo build --release -p biliup-cli

      - name: 运行集成测试
        run: |
          echo "运行集成测试..."
          # 这里可以添加集成测试脚本
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/biliup_test
        continue-on-error: true

  # ==========================================
  # 阶段 7: 构建发布产物
  # ==========================================
  build-release:
    name: 构建发布产物 (${{ matrix.platform.target }})
    needs: [rust-build-and-test, python-test, frontend-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 构建前端
        run: |
          npm ci
          npm run build

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-${{ matrix.platform.target }}"

      - name: 构建 Release
        run: cargo build --release -p biliup-cli --target ${{ matrix.platform.target }}

      - name: 打包 (Unix)
        if: matrix.platform.os != 'windows-latest'
        run: |
          cd target/${{ matrix.platform.target }}/release
          tar czvf ../../../biliup-${{ matrix.platform.name }}.tar.gz biliup
          cd ../../..

      - name: 打包 (Windows)
        if: matrix.platform.os == 'windows-latest'
        run: |
          cd target/${{ matrix.platform.target }}/release
          7z a ../../../biliup-${{ matrix.platform.name }}.zip biliup.exe
          cd ../../..

      - name: 上传发布产物
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform.name }}
          path: |
            biliup-*.tar.gz
            biliup-*.zip
          retention-days: 30

  # ==========================================
  # 阶段 8: 发布到 Release
  # ==========================================
  publish-release:
    name: 发布 Release
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # 阶段 9: 通知
  # ==========================================
  notify:
    name: 发送通知
    needs: [lint-and-format, rust-build-and-test, python-test, coverage, frontend-build, integration-test]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: 检查工作流状态
        id: check_status
        run: |
          if [ "${{ needs.lint-and-format.result }}" == "failure" ] || \
             [ "${{ needs.rust-build-and-test.result }}" == "failure" ] || \
             [ "${{ needs.python-test.result }}" == "failure" ] || \
             [ "${{ needs.frontend-build.result }}" == "failure" ] || \
             [ "${{ needs.integration-test.result }}" == "failure" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=? CI/CD 工作流执行失败" >> $GITHUB_OUTPUT
          elif [ "${{ needs.lint-and-format.result }}" == "cancelled" ] || \
               [ "${{ needs.rust-build-and-test.result }}" == "cancelled" ] || \
               [ "${{ needs.python-test.result }}" == "cancelled" ]; then
            echo "status=cancelled" >> $GITHUB_OUTPUT
            echo "message=?? CI/CD 工作流已取消" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=? CI/CD 工作流执行成功" >> $GITHUB_OUTPUT
          fi

      - name: 创建详细报告
        id: create_report
        run: |
          cat << 'EOF' > report.md
          ## CI/CD 执行报告

          ### 工作流信息
          - **仓库**: ${{ github.repository }}
          - **分支**: ${{ github.ref_name }}
          - **提交**: ${{ github.sha }}
          - **提交者**: ${{ github.actor }}
          - **时间**: ${{ github.event.head_commit.timestamp }}

          ### 执行结果
          | 任务 | 状态 |
          |------|------|
          | 代码检查 | ${{ needs.lint-and-format.result }} |
          | Rust 编译测试 | ${{ needs.rust-build-and-test.result }} |
          | Python 测试 | ${{ needs.python-test.result }} |
          | 覆盖率分析 | ${{ needs.coverage.result }} |
          | 前端构建 | ${{ needs.frontend-build.result }} |
          | 集成测试 | ${{ needs.integration-test.result }} |

          ### 链接
          - [查看工作流详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - [查看提交](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          EOF

      - name: 发布到 GitHub Checks
        uses: LouisBrunner/checks-action@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: CI/CD 总结
          conclusion: ${{ steps.check_status.outputs.status }}
          output: |
            {
              "title": "${{ steps.check_status.outputs.message }}",
              "summary": "查看详细报告",
              "text": ${{ toJSON(steps.create_report.outputs) }}
            }
        continue-on-error: true

      - name: 发送邮件通知 (失败时)
        if: steps.check_status.outputs.status == 'failure' && secrets.SMTP_PASSWORD != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: '? [${{ github.repository }}] CI/CD 失败'
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: GitHub Actions
          html_body: |
            <h2>CI/CD 工作流执行失败</h2>
            <p><strong>仓库:</strong> ${{ github.repository }}</p>
            <p><strong>分支:</strong> ${{ github.ref_name }}</p>
            <p><strong>提交:</strong> ${{ github.sha }}</p>
            <p><strong>提交者:</strong> ${{ github.actor }}</p>
            <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">查看详情</a></p>
        continue-on-error: true

      - name: 发送 Telegram 通知
        if: secrets.TELEGRAM_BOT_TOKEN != ''
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ${{ steps.check_status.outputs.message }}

            仓库: ${{ github.repository }}
            分支: ${{ github.ref_name }}
            提交: ${{ github.sha }}
            提交者: ${{ github.actor }}

            查看详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true

      - name: 发送 Discord 通知
        if: secrets.DISCORD_WEBHOOK != ''
        uses: Ilshidur/action-discord@master
        with:
          args: |
            ${{ steps.check_status.outputs.message }}

            仓库: ${{ github.repository }}
            分支: ${{ github.ref_name }}
            提交: ${{ github.sha }}

            查看详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        continue-on-error: true
